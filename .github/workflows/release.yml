name: Release Verify

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.5.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Verify published release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # Build *from the release tag* for deterministic, auditable artifacts.
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve tag and verify version alignment (strict)
        id: meta
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if ! python3 - <<'PY'
          import os, re
          from pathlib import Path
          tag = os.environ["TAG_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Invalid tag format: {tag!r} (expected vX.Y.Z)")
          tex = Path("whitepaper/WHITEPAPER.tex").read_text(encoding="utf-8")
          m = re.search(r"\\newcommand\{\\SchiavinatoSharingVersion\}\{([^}]+)\}", tex)
          if not m:
              raise SystemExit("Missing \\SchiavinatoSharingVersion macro in whitepaper/WHITEPAPER.tex")
          version = m.group(1).strip()
          if version != tag:
              raise SystemExit(f"Tag/whitepaper mismatch: tag={tag!r} whitepaper={version!r}")
          print(f"OK: tag={tag} whitepaper={version}")
          PY
          then
            exit 1
          fi
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify published release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          expected=(
            "WHITEPAPER.pdf"
            "WHITEPAPER.pdf.asc"
            "WHITEPAPER-${TAG_NAME}.pdf"
            "WHITEPAPER-${TAG_NAME}.pdf.asc"
            "CHECKSUMS.txt"
            "CHECKSUMS.txt.asc"
          )
          for f in "${expected[@]}"; do
            gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' | grep -Fx -- "${f}" >/dev/null
          done

  verify-existing-release:
    name: Verify existing published release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name != 'release'

    steps:
      - name: Validate tag input
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.tag }}" ]; then
            echo "Missing required input: tag (e.g., v0.5.0)" >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Verify tag/version alignment (strict)
        id: meta
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re
          from pathlib import Path
          tag = os.environ["TAG_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Invalid tag format: {tag!r} (expected vX.Y.Z)")
          tex = Path("whitepaper/WHITEPAPER.tex").read_text(encoding="utf-8")
          m = re.search(r"\\newcommand\{\\SchiavinatoSharingVersion\}\{([^}]+)\}", tex)
          if not m:
              raise SystemExit("Missing \\SchiavinatoSharingVersion macro in whitepaper/WHITEPAPER.tex")
          version = m.group(1).strip()
          if version != tag:
              raise SystemExit(f"Tag/whitepaper mismatch: tag={tag!r} whitepaper={version!r}")
          print(f"OK: tag={tag} whitepaper={version}")
          PY
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify published release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          expected=(
            "WHITEPAPER.pdf"
            "WHITEPAPER.pdf.asc"
            "WHITEPAPER-${TAG_NAME}.pdf"
            "WHITEPAPER-${TAG_NAME}.pdf.asc"
            "CHECKSUMS.txt"
            "CHECKSUMS.txt.asc"
          )
          for f in "${expected[@]}"; do
            gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' | grep -Fx -- "${f}" >/dev/null
          done
